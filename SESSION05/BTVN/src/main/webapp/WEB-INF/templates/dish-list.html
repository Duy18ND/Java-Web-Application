<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Thực đơn</title>
    <style>
        table { width: 60%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        .alert-error { color: #721c24; background-color: #f8d7da; padding: 10px; margin-bottom: 15px; border: 1px solid #f5c6cb; width: 60%; font-weight: bold;}
    </style>
</head>
<body>

<h2>Danh Sách Món Ăn (Bài 3)</h2>

<div th:if="${errorMessage != null}" class="alert-error" th:text="${errorMessage}"></div>

<table th:unless="${dishes == null or #lists.isEmpty(dishes)}">
    <thead>
    <tr>
        <th>ID</th>
        <th>Tên Món</th>
        <th>Giá (VNĐ)</th>
        <th>Trạng Thái</th>
        <th>Hành động</th> </tr>
    </thead>
    <tbody>
    <tr th:each="dish : ${dishes}">
        <td th:text="${dish.id}"></td>
        <td th:text="${dish.name}"></td>
        <td th:text="${dish.price}"></td>
        <td th:text="${dish.isAvalible ? 'Còn hàng' : 'Hết hàng'}"></td>

        <td>
            <a th:href="@{|/bai3/edit/${dish.id}|}">Chỉnh sửa</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
