<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chỉnh sửa món ăn</title>
  <style>
    .form-group { margin-bottom: 15px; }
    label { display: inline-block; width: 120px; font-weight: bold; }
    .btn-container { margin-top: 20px; }
  </style>
</head>
<body>

<h2>Chỉnh Sửa Thông Tin Món Ăn</h2>

<form th:object="${dish}" th:action="@{/bai3/save}" method="post">

  <input type="hidden" th:field="*{id}" />

  <div class="form-group">
    <label>Tên món ăn:</label>
    <input type="text" th:field="*{name}" required />
  </div>

  <div class="form-group">
    <label>Giá (VNĐ):</label>
    <input type="number" th:field="*{price}" required min="0" step="1000"/>
  </div>

  <div class="form-group">
    <label>Trạng thái:</label>
    <select th:field="*{avalible}">
      <option value="true">Còn hàng</option>
      <option value="false">Hết hàng</option>
    </select>
  </div>

  <div class="btn-container">
    <button type="submit">Lưu thay đổi</button>
    <a th:href="@{/bai3/dishes}">Quay lại</a>
  </div>
</form>

</body>
</html>
