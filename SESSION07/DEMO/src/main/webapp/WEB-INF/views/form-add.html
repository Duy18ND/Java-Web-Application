<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<form th:action="@{/handle-add}" th:object="${student}" method="post">

    <!-- ID -->
    <div class="form-group">
        <label th:for="*{id}">ID</label>
        <input type="text" class="form-control" th:field="*{id}">
    </div>

    <!-- Name -->
    <div class="form-group">
        <label th:for="*{name}">Name</label> <!-- FIX -->
        <input type="text" class="form-control" th:field="*{name}">
    </div>

    <!-- Gender -->
    <div class="form-check">
        <label class="form-check-label">
            <input type="radio" class="form-check-input" th:field="*{gender}" value="true">
            Nam
        </label>

        <label class="form-check-label">
            <input type="radio" class="form-check-input" th:field="*{gender}" value="false">
            Nữ
        </label>
    </div>

    <!-- Age -->
    <div class="form-group">
        <label th:for="*{age}">Age</label>
        <input type="number" class="form-control" th:field="*{age}">
    </div>

    <!-- Address -->
    <div class="form-group">
        <label th:for="*{address}">Address</label>
        <input type="text" class="form-control" th:field="*{address}">
    </div>

    <!-- Submit -->
    <button type="submit" class="btn btn-primary">Save</button>

</form>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
